<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift for Ha ✨</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,400&family=Quicksand:wght@300;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Falling stars background -->
    <div class="stars-container" id="stars"></div>

    <div class="container">
        <!-- STEP 1: Countdown (Inspired by Source 16) -->
        <section id="step1" class="active">
            <div class="timer-header">
                <p class="small-tag">✦ COUNTDOWN ✦</p>
                <h1 class="timer-title">Her Special Day</h1>
                <h2 class="timer-subtitle">is Coming</h2>
                <p class="desc-timer">Something beautiful is waiting for you ♡</p>
            </div>
            <div id="timer-container">
                <div class="timer-box"><span id="days">00</span><p class="label">DAYS</p></div>
                <div class="separator">:</div>
                <div class="timer-box"><span id="hours">00</span><p class="label">HOURS</p></div>
                <div class="separator">:</div>
                <div class="timer-box"><span id="minutes">00</span><p class="label">MINUTES</p></div>
                <div class="separator">:</div>
                <div class="timer-box"><span id="seconds">00</span><p class="label">SECONDS</p></div>
            </div>
            <button id="toStep2" class="main-btn-anim">✦ OPEN HER GIFT ➜</button>
        </section>

        <!-- STEP 2: Gift Box (Text is now ABOVE the box) -->
        <section id="step2" class="hidden">
            <div class="gift-wrapper">
                <!-- Text moved above the box -->
                <p class="text-above-box">A small gift just for Ha</p>
                
                <div class="luxury-gift" id="gift-box">
                    <div class="lid">
                        <div class="ribbon-v"></div>
                        <div class="bow"></div>
                    </div>
                    <div class="box-body">
                        <div class="ribbon-v"></div>
                    </div>
                </div>
                <p class="blinking-text">Thank you for accepting the gift</p>
            </div>
        </section>

        <!-- STEP 3: Your Special Day Interface -->
        <section id="step3" class="hidden">
            <div class="special-content">
                <p class="sub-top">⭐️ A LOVE LETTER FOR YOU ⭐️</p>
                <h1 class="special-day-title">Your Special Day</h1>
                <p class="sub-bottom">Created with love, just for you</p>
                
                <button id="toStep4" class="main-btn-anim">READ MY LETTER</button>

                <!-- Memory photo frames -->
                <div class="photo-frame p1"><img src="image/8.jpg" ></div>
                <div class="photo-frame p2"><img src="image/4.jpg" ></div>
                <div class="photo-frame p3"><img src="image/3.jpg" ></div>
                <div class="photo-frame p4"><img src="image/7.jpg" ></div>
                <div class="photo-frame p5"><img src="image/5.jpg" ></div>
                <div class="photo-frame p6"><img src="image/6.jpg" ></div>
            </div>
        </section>

        <!-- STEP 4: The Letter -->
        <section id="step4" class="hidden">
            <h2 class="birthday-day-title">Happy Birthday,</h2>
                <div class="letter-paper">
        <!-- Nơi nội dung thư sẽ tự động chạy vào -->
        <div id="typewriter-text" class="letter-content"></div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>

    <div id="imageModal" class="modal">
  <span class="close-btn">&times;</span>
  <img class="modal-content" id="fullImage">
</div>

</body>
</html>
